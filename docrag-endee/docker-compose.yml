version: "3.9"

services:

  endee:
    image: endeeio/endee:latest
    container_name: endee-db
    ports:
      - "8080:8080"
    volumes:
      - endee_data:/data
    environment:
      - ENDEE_DATA_DIR=/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: docrag-app
    ports:
      - "8501:8501"
    env_file: .env
    environment:
      - ENDEE_HOST=http://endee:8080
    depends_on:
      endee:
        condition: service_healthy
    volumes:
      - ./data:/app/data
    restart: unless-stopped

volumes:
  endee_data:
